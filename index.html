<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NepPath VTC</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
  font-family: 'Segoe UI', sans-serif;
  background: url('NepPath.jpg') no-repeat center center/cover;
  color: white;
}
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="Ico/NepPath Logo circle dim.png" alt="VTC Logo">
    </div>
    <nav id="navMenu">
      <a href="#home">Home</a>
      <a href="event.html">Event</a>
      <a href="team.html#team">Team</a>
      <a href="contactUS.html">Contact Us</a>
      <a href="join.html">Join</a>
      <a href="admin/admin.html">Admin Login</a>
    </nav>
    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </header>

  <section class="hero-section">
    <div class="hero-content">
      <h1>Welcome to NepPath VTC</h1>
      <p>Drive. Connect. Conquer.</p>
      <button class="join-btn" onclick="window.location.href='join.html'">Join Now</button>
    </div>
  </section>

  <!-- Signin Popup -->
  <div class="popup" id="signinPopup">
    <span class="close" onclick="closeSignin()">×</span>
    <h2>Admin Sign In</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="submitLogin()">Login</button>
  </div>

  <!-- Alert -->
  <div id="alertBox" class="alert"></div>

  <script src="js/script.js"></script>
</body>
</html>
