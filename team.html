<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NepPath VTC - Team</title>

  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/team.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <img src="Ico\NepPath Logo circle dim.png" alt="NepPath VTC Logo">
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <nav id="menu">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="contactUS.html#contact">Contact Us</a>
      <a href="join.html#Join">Join</a>
    </nav>
  </header>

  <!-- TEAM SECTION -->
  <section class="team-section">
    <div class="team-grid" id="teamGrid">
      <p style="text-align:center; width:100%;">Loading Team Members...</p>
    </div>
  </section>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
    }

    const firebaseConfig = {
      apiKey: "AIzaSyCHALD_GGX-KTx0edaJeLZTezQWD5bARk4",
      authDomain: "neppath-1415f.firebaseapp.com",
      projectId: "neppath-1415f",
      storageBucket: "neppath-1415f.firebasestorage.app",
      messagingSenderId: "934979565356",
      appId: "1:934979565356:web:d6cfb97398c323a5101e89",
      measurementId: "G-22PMW3P48D"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const teamGrid = document.getElementById('teamGrid');

    // Real-time listener for members
    db.collection("members").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
      teamGrid.innerHTML = ""; // Clear loading text
      
      snapshot.forEach((doc) => {
        const member = doc.data();
        const defaultAvatar = 'Ico/NepPath Logo circle dim.png';
        const avatarSrc = member.avatar || defaultAvatar;
        
        const memberDiv = document.createElement('div');
        memberDiv.className = 'team-member';
        memberDiv.innerHTML = `
          <img src="${avatarSrc}" alt="${member.name}" class="avatar" onerror="this.src='${defaultAvatar}'">
          <div class="name">${member.name}</div>
          <button class="role-btn">${member.role}</button>
          <div class="member-icons">
            ${member.tmpId ? `<a href="https://truckersmp.com/user/${member.tmpId}" target="_blank"><i class="fas fa-truck"></i></a>` : ''}
          </div>
        `;
        teamGrid.appendChild(memberDiv);
      });

      if(snapshot.empty) {
        teamGrid.innerHTML = "<p style='text-align:center; width:100%;'>No team members found.</p>";
      }
    });
  </script>

</body>
</html>
